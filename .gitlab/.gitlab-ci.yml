stages:
    - lint
    - build
    - analyze
    - deploy

include:
    - template: Jobs/SAST.gitlab-ci.yml
    - template: Jobs/SAST-IaC.gitlab-ci.yml
    - template: Jobs/Secret-Detection.gitlab-ci.yml

default:
    cache:
        key:
            files:
                - package-lock.json
        paths:
            - .npm
        policy: pull-push

lint:eslint:
    stage: lint
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run lint
    artifacts:
        when: always
        reports:
            codequality: gl-codequality.json
        expire_in: 1 hour

build:node:
    stage: build
    image: node:22-alpine
    before_script:
        - npm ci --cache .npm --prefer-offline
    script:
        - npm run build
    artifacts:
        paths:
            - dist/
        expire_in: 1 hour
    dependencies: []

sast:
    stage: analyze

iac-sast:
    stage: analyze

secret_detection:
    stage: analyze

deploy:pages:
    stage: deploy
    image: alpine:3
    rules:
        - if: $CI_COMMIT_TAG
          when: on_success
        - if: $CI_COMMIT_BRANCH
          when: manual
    pages:
        publish: dist
    before_script: []
    script:
        - echo 'Deploy to GitLab Pages'
    artifacts:
        expire_in: 1 hour
    dependencies:
        - build:node
    allow_failure: false
